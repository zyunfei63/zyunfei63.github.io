span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br></pre></td><td class="code"><pre><span class="line">岗位名称：Golang技术主管</span><br><span class="line">工作地点：西港/越南/台湾</span><br><span class="line">薪资范围：4000-7000 美金</span><br><span class="line">人数需求：数位</span><br><span class="line"></span><br><span class="line">岗位职责： </span><br><span class="line"></span><br><span class="line"><span class="bullet">1.</span> 负责直播平台后端系统开发，优化高并发场景下的API性能；   </span><br><span class="line"><span class="bullet">2.</span> 设计弹幕分发、礼物统计、实时互动等核心模块，保障低延迟；   </span><br><span class="line"><span class="bullet">3.</span> 使用Go语言设计并实现游戏服务端逻辑、后台系统  </span><br><span class="line"><span class="bullet">4.</span> 参与游戏服务器的架构设计，确保系统的高性能和高可扩展性  </span><br><span class="line"><span class="bullet">5.</span> 设计并优化数据库结构，确保数据存储和访问效率  </span><br><span class="line"><span class="bullet">6.</span> 进行服务器性能调优，能够应对高并发用户的访问需求  </span><br><span class="line"><span class="bullet">7.</span> 与开发团队其他职能合作，快速响应项目需求并解决开发过程中的技术问题</span><br><span class="line"></span><br><span class="line"><span class="strong">****</span></span><br><span class="line"><span class="bullet">1.</span> 负责各类型游戏的后端业务逻辑开发与功能模块维护，实现游戏下注、掉落、结算、爆奖判定、免费游戏触发等核心玩法； </span><br><span class="line"><span class="bullet">2.</span> 开发并维护游戏日志系统，包括下注记录、掉落记录、乘数/爆奖记录等 </span><br><span class="line"><span class="bullet">3.</span> 配合数值策划配置RTP段位与符号权重表，实现后台RTP控制、控水逻辑接入； </span><br><span class="line"><span class="bullet">4.</span> 与Cocos前端联调游戏协议，确保客户端逻辑实现； </span><br><span class="line"><span class="bullet">5.</span> 支持游戏配置中心（符号配置、RTP配置、模式开关）后台系统功能开发 </span><br><span class="line"><span class="bullet">6.</span> 实现通用模块：用户数据缓存、重连机制、断线保护、状态管理等； </span><br><span class="line"><span class="bullet">7.</span> 协助测试/策划复盘掉落异常、赔率异常、触发频率问题； </span><br><span class="line"><span class="bullet">8.</span> 开发和维护与合作方对接接口，撰写技术文档，输出接口说明、字段说明、版本变更记录等； </span><br><span class="line"><span class="bullet">9.</span> 持续优化现有逻辑和后端开发框架，提升代码质量，保障高并发下注下的低延迟与稳定性。</span><br><span class="line"></span><br><span class="line">岗位要求：</span><br><span class="line"></span><br><span class="line"><span class="bullet">1.</span> 计算机科学、软件工程或相关专业本科及以上学历，具备丰富的Go语言开发经验  </span><br><span class="line"><span class="bullet">2.</span> 3年以上Go语言服务端开发经验，有游戏服务端项目经验者优先，熟悉微服务架构（如gRPC/Kafka）；   </span><br><span class="line"><span class="bullet">3.</span> 有直播/音视频项目经验，熟悉CDN、RTMP协议及流媒体处理逻辑；能优化百万级在线系统的稳定性。 </span><br><span class="line"><span class="bullet">4.</span> 熟悉高并发、分布式系统的设计及优化，对网络编程（TCP、UDP、WebSocket等）有深入理解  </span><br><span class="line"><span class="bullet">5.</span> 熟悉MySQL、Redis等常用数据库，具备良好的数据结构设计能力  </span><br><span class="line">有良好的代码规范和编程习惯，能编写高效、可维护的代码</span><br><span class="line"><span class="bullet">*</span></span><br><span class="line"><span class="bullet">1.</span> 计算机科学、软件工程或相关专业本科及以上学历 </span><br><span class="line"><span class="bullet">2.</span> 2年以上Golang实际开发经验，有微服务经验，有游戏后端、API服务或高并发系统经验者优先 </span><br><span class="line"><span class="bullet">3.</span> 熟悉常见设计模式，具备良好的编程习惯和代码结构思维 </span><br><span class="line"><span class="bullet">4.</span> 熟悉 Gin/GORM 等主流 Golang 框架，了解 grpc 优先 </span><br><span class="line"><span class="bullet">5.</span> 熟悉 MySQL/Redis/MongoDB等数据库，能独立编写查询与优化逻辑 </span><br><span class="line"><span class="bullet">6.</span> 理解 WebSocket接口通信，能完成客户端/服务端双向数据交互 </span><br><span class="line"><span class="bullet">7.</span> 熟悉 JSON序列化、Protobuf、奖励控制、状态机处理等游戏后端模块 </span><br><span class="line"><span class="bullet">8.</span> 熟悉 RTP控制、免费模式结算逻辑等 Slots游戏结构者优先 </span><br><span class="line"><span class="bullet">9.</span> 有一定部署能力，了解 Linux基本命令、Docker容器化部署者优先 </span><br><span class="line"><span class="bullet">10.</span> 有团队协作意识，能清晰与策划、测试、前端对接，主动沟通版本逻辑</span><br><span class="line">@jishu<span class="emphasis">_jobs</span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis">-----------</span></span><br><span class="line"><span class="emphasis">招聘：中高级前端开发工程师（后台管理）</span></span><br><span class="line"><span class="emphasis"> 薪资范围：15-20k</span></span><br><span class="line"><span class="emphasis">一、岗位职责</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">1. 负责企业级后台管理系统的前端架构设计、核心功能开发与性能优化，保障系统稳定性与易用性。</span></span><br><span class="line"><span class="emphasis">2. 参与产品需求评审与技术方案研讨，结合前端技术栈输出合理交互与实现建议，推动需求落地。</span></span><br><span class="line"><span class="emphasis">3. 主导前端组件库、工具库的搭建与维护，沉淀可复用业务组件与解决方案，提升团队研发效率。</span></span><br><span class="line"><span class="emphasis">4. 攻克前端开发中的跨浏览器兼容、性能瓶颈、复杂交互等技术难题，持续优化用户体验。</span></span><br><span class="line"><span class="emphasis">5. 合理运用 AI 工具提升研发效率，探索 AI 技术在前端开发、组件设计、性能优化等场景的落地应用。</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">二、任职要求</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">（一）技术硬实力</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">1. 基础能力</span></span><br><span class="line"><span class="emphasis">- 精通 HTML5/CSS3/JavaScript 原生语法，深入理解原型链、闭包、异步编程等核心概念，熟练运用 ES6+ 新特性。</span></span><br><span class="line"><span class="emphasis">- 熟练掌握 Webpack/Vite 构建配置、ESLint/Prettier 代码规范、Git 版本管理流程等前端工程化工具。</span></span><br><span class="line"><span class="emphasis">2. 框架与组件</span></span><br><span class="line"><span class="emphasis">- 精通 Vue 3 + Pinia + Vue Router 技术栈，具备大型 Vue 项目架构设计与状态管理经验；或精通 React + Redux/Mobx + React Router 技术栈，熟悉 Hooks 原理与实践。</span></span><br><span class="line"><span class="emphasis">- 熟练使用 Element Plus、Ant Design 等主流中后台组件库，能够基于组件库进行二次封装与功能扩展。</span></span><br><span class="line"><span class="emphasis">3. 业务与优化</span></span><br><span class="line"><span class="emphasis">- 熟悉后台管理系统常见业务场景（权限管理、数据可视化、表单设计、表格操作等），能独立实现复杂业务逻辑。</span></span><br><span class="line"><span class="emphasis">- 掌握前端性能优化手段（代码分割、懒加载、缓存策略、首屏加载优化等），了解浏览器渲染原理，能排查并解决页面卡顿、内存泄漏等问题。</span></span><br><span class="line"><span class="emphasis">4. 协作与工具</span></span><br><span class="line"><span class="emphasis">- 熟悉前后端分离架构，熟练使用 Axios 进行接口请求，能与后端高效协作并定义、维护接口文档。</span></span><br><span class="line"><span class="emphasis">- 熟练应用 TypeScript，具备强类型编程思维，提升代码可维护性与可读性。</span></span><br><span class="line"><span class="emphasis">5. AI 工具应用能力</span></span><br><span class="line"><span class="emphasis">- 熟练使用 AI 开发辅助工具（如 Copilot、Cursor、通义灵码等），能够借助 AI 完成代码生成、重构、Bug 排查、技术文档撰写等工作。</span></span><br><span class="line"><span class="emphasis">- 具备基于 AI 工具进行前端需求分析、组件设计、性能优化方案推导的能力，能将 AI 工具与实际开发流程结合，提升研发效率。</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">（二）软实力要求</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">1. 具备 3-5 年及以上 前端开发经验，有大型企业级后台管理系统开发经验者优先。</span></span><br><span class="line"><span class="emphasis">2. 具备优秀的问题分析与解决能力，能独立应对复杂技术挑战，有线上问题排查经验。</span></span><br><span class="line"><span class="emphasis">3. 具备良好的沟通协作能力与团队意识，能清晰表达技术方案，推动跨团队项目协作。</span></span><br><span class="line"><span class="emphasis">4. 具备较强的学习能力与自驱力，关注前端技术及 AI 技术发展趋势，能将新技术应用于实际项目。</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">三、加分项</span></span><br><span class="line"><span class="emphasis"> </span></span><br><span class="line"><span class="emphasis">1. 熟悉 qiankun、single-spa 等微前端架构，并有实际项目落地经验。</span></span><br><span class="line"><span class="emphasis">2. 掌握 ECharts、G2、D3.js 等数据可视化技术，能实现复杂可视化图表。</span></span><br><span class="line"><span class="emphasis">3. 了解 Node.js 开发，能够编写简单后端接口或自动化脚本工具。</span></span><br><span class="line"><span class="emphasis"></span></span><br><span class="line"><span class="emphasis">TG: @jishu_</span>jobs</span><br><span class="line"></span><br><span class="line">---</span><br><span class="line">JAVA 工程师</span><br><span class="line"></span><br><span class="line">💞工作职责:</span><br><span class="line">1、负责公司相关游戏产品的后台开发工作；</span><br><span class="line">2、建立、优化系统数据库及平台服务系统，按功能模块完成需求；</span><br><span class="line">3、分析开发需求，并参与系统开发设计。</span><br><span class="line"></span><br><span class="line">💞岗位要求:</span><br><span class="line">1、Java基础扎实，理解IO、多线程、集合等基础框架，对JVM原理有一定的了解；</span><br><span class="line">2、深入理解Java Socket编程，Java NIO， Netty等网络编程相关知识；</span><br><span class="line">3、熟悉SpringMVC，有Spring Cloud/SpringBoot/微服务经验；</span><br><span class="line">4、熟悉Redis、MySQL和MongoDB等缓存及数据库；</span><br><span class="line">5、具备较强的分析问题解决问题的能力，思维敏捷，喜欢有挑战性的工作；</span><br><span class="line">6、有较好的编码规范习惯；</span><br><span class="line">7、有团队精神、有责任心、有较强的执行力，抗压能力强，能够接受加班；</span><br><span class="line"></span><br><span class="line">💞优先条件:</span><br><span class="line">1、有高并发系统开发经验者；</span><br><span class="line">2、有Spring Cloud/SpringBoot/微服务经验者；</span><br><span class="line">3、从事过即时通讯相关产品，有海量用户分布式系统开发经验者；</span><br><span class="line"></span><br><span class="line">💞薪资福利：</span><br><span class="line">1.单休工作制</span><br><span class="line">2.工作时间：9：00-18：30，午餐12：00-13：00</span><br><span class="line">3.提供标准2人间住宿</span><br><span class="line">4.年13薪和年终优秀员工评选</span><br></pre></td></tr></table></figure>
